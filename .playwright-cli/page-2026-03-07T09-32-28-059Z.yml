                      - generic [ref=e2438]:
                        - text: "UPDATE: eLightBulb reached out and sent a replacement set at no cost. They were friendly and easy to work with. Great customer service! Would definitely recommend for anyone looking for lights they intend on keeping stationary or at least not doing a lot of hanging up/taking down. Mine going out also could have been a fluke. Either way, pleased they made it right and happy with my new set."
                        - text: These are great, as long as you don’t ever want to take them down or move them. I had these strung across the ceiling of my classroom - worked great; no issues at all; stayed bright and did everything they were supposed to do. I took them down to move to another classroom (and I took care not to bang the bulbs or be rough on the wires), and as I was unwinding them to string back up, the just quit working. The base still has power and is responding to the remote, but the whole strand of lights is just dead. I got one year of use out of them. Disappointing since I barely touched them.
