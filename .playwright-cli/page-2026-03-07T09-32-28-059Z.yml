                      - generic [ref=e2362]: I purchased these in November of 2022 and started using them for that year's Christmas. The 4 sets I've used each year have worked perfectly with no failures, no bulbs out. They feel light and delicate but that's because LEDs do not require a lot of material. The bulbs are a tough plastic, which does not easily break, even though part of a string may unravel and drop to the concrete when stringing them up. Use normal care (for today's Christmas lights) when stringing them and they should last. I cannot speak for the remote because I use one timer for all the lights and the mode function in on the light string plug, except the 3 volt battery in the one remote I activate in 2022 showed 3.1 volts when I tested it a few days ago. IMPORTANT you cannot string them in series because there is no outlet at the end. Just use an additional extension cord and the long leader on each set; it's worth the extra time it will take.
