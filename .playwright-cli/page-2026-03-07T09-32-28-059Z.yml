            - list [ref=e776]:
              - listitem [ref=e777]: "Commercial quality string lights: The globe around the lights are shatterproof because they are made out of plastic. 100 led bulbs give off a warm white light. An ul listed power adapter comes with the lights. Diameter of the bulb is 0.7 inch, and the spacinga between bulbs is 4 inches"
              - listitem [ref=e778]: "Timer Functions and 8 Mode Lights: The rv globe lights have 8 lighting modes, namely combination, in waves, sequential, slo-glo, chasing or flash, slow fade, twinkle and flash, and steady on. The rv outdoor lights also have a memory function allowing you to set your specific mode and use the timer function on the remote to turn on the lights for 6 hours and off for 18 hours automatically every day."
              - listitem [ref=e779]: "Waterproof and eco-friendly: Our plug-in string lights are IP44 waterproof, which makes them suitable for indoor or outdoor use. The bulbs around the lights are safe and reliable, keeping a low temperature even after many hours of use, the rv canopy lights adapt to special occasions like dating, weddings, anniversaries, or birthday parties"
              - listitem [ref=e780]: "Widely used: These string lights can be used for indoor or outdoor lighting. The lights create a festive atmosphere. These are the best choices for christmas trees and garlands. Ideal for ambience mood decoration in your bedroom, living room, balcony, garden, patio, tent, awning, hotel, etc. Also perfect as gifts for family and friends"
              - listitem [ref=e781]: "Easy to use: These bulb string lights are lightweight and easy to install with cable tie, cup hook or grippers"
