                      - generic [ref=e2570]:
                        - generic [ref=e2572]:
                          - text: First off, these lights are GORGEOUS. Like, perfect size, perfect warmth, perfect texture, perfect brightness. I love the look of them! Overall, i'm happy with my purchase.
                          - text: "But note:"
                          - text: 1)The lights have a BUNCH different modes (twinkling, flashing, always on etc), and sometimes the ones i have will randomly switch modes. So, while i normally have it set to "always on" mode (no flashing), sometimes out of nowhere it will switch to full-on rave flashing. Its super disorienting.
                          - text: I THINK its because the receiver for the remote can pick up signals from tv remotes etc. So it might be the tv remote or some other electronics interfering with it.
                          - text: I fixed this by moving the lights from the living room to the bedroom (where there are less electronics to interfere).
                          - text: I wished I knew this when i bought it though, as they were meant to go up in the living room.
                          - text: 2) Also, I wish the default setting was regular "always on" mode, because every time i turn them on, it goes directly to one of the flashy settings and its disorienting for the first second. Not a huge deal though.
                          - text: Otherwise, they are fantastic!
